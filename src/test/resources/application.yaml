server:
  port: 8888
spring:
  application:
    name: spring-boot-rest-study
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show-sql: false
        open-in-view: false
  flyway:
    enabled: true
springdoc:
  paths-to-match: /api/v1/**/**
  swagger-ui:
    use-root-path: true
